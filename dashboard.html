<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <!-- NAVBAR -->
    <nav class="navbar bg-white p-3 mb-4">
        <h4>Dashboard</h4>
        <div>
            <a href="dashboard.html" class="btn btn-outline-primary">Home</a>
            <a href="exercise.html" class="btn btn-primary">Exercícios</a>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </nav>

    <!-- USER INFO -->
    <div class="card p-3 mb-4">
        <h4 id="welcome"></h4>

        <span id="level" class="badge bg-success badge-level"></span>

        <p>A - Texto Embaralhado</p>
        <div class="progress mb-2">
            <div id="progA" class="progress-bar bg-success"></div>
        </div>

        <p>B - Associar Imagem</p>
        <div class="progress mb-2">
            <div id="progB" class="progress-bar bg-warning"></div>
        </div>

        <p>C - Quizz</p>
        <div class="progress mb-2">
            <div id="progC" class="progress-bar bg-info"></div>
        </div>

        <p>D - Sopa de Letras</p>
        <div class="progress mb-2">
            <div id="progD" class="progress-bar bg-info"></div>
        </div>

        <div class="card p-3 d-flex justify-content-center align-items-center" style="height:100px;">
            <h5 id="recommendation" class="text-center"></h5>
        </div>
    </div>

    <!-- GAMIFICAÇÃO -->
    <div class="row">

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>XP Total Ganha</h5>
                <h2 id="points"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Sequência</h5>
                <h2 id="streak">0 dias</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Favoritos</h5>
                <h2>
                    <span id="favoritesCount"></span>
                </h2>
            </div>
        </div>

    </div>

    <!-- AÇÕES -->
    <div class="card mt-4 p-3">
        <h5>Escolhe um exercício</h5>

        <div class="row mt-3">

            <div class="col-md-6 mb-3">
                <div class="card exercise-card p-3 text-center" onclick="goExercise('a')">
                    <p>Completar palavras</p>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card exercise-card p-3 text-center" onclick="goExercise('b')">
                    <p>Associar imagem</p>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card exercise-card p-3 text-center" onclick="goExercise('c')">
                    <p>Quizz</p>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card exercise-card p-3 text-center" onclick="goExercise('d')">
                    <p>Sopa de letra</p>
                </div>
            </div>

        </div>
    </div>

    <script src="js/controllers/userController.js"></script>

</body>

</html>
