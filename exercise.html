<!DOCTYPE html>
<html>

<head>
    <title>Exercício</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <!-- NAVBAR -->
    <nav class="navbar bg-white p-3 mb-4">
        <h4 id="exerciseTitle">Exercício</h4>
        <a href="dashboard.html" class="btn btn-outline-primary">Voltar</a>
    </nav>

    <div class="row">

        <!-- EXERCÍCIO -->
        <div class="col-md-6">
            <div class="card p-3">

                <h3 id="question"></h3>

                <!-- INPUT -->
                <input id="answerInput" class="form-control mb-2 d-none">

                <!-- OPÇÕES -->
                <div id="optionsContainer" class="d-none"></div>

                <button onclick="checkAnswer()" class="btn btn-primary mt-2">
                    Responder
                </button>

            </div>
        </div>

        <!-- CANVAS (para sopa de letras depois) -->
        <div class="col-md-6">
            <canvas id="canvas" class="w-100" height="250"></canvas>
        </div>

    </div>

    <script src="js/canvasExercises.js"></script>
    <script src="js/controllers/exerciseController.js"></script>

</body>

</html>
