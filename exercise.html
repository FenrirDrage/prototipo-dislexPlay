<!DOCTYPE html>
<html>

<head>
    <title>Exercício</title>
    <link rel="icon" href="images/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <!-- NAVBAR -->
    <nav class="navbar bg-white p-3 mb-4">
        <h4 id="exerciseTitle">Exercício</h4>
        <a href="dashboard.html" class="btn btn-outline-primary">Voltar</a>
    </nav>

    <div class="row">

        <!-- EXERCÍCIO -->
        <div class="mt-3">
            <input type="text" id="answerInput" class="form-control" placeholder="Escreve a palavra">

            <button id="checkBtn" class="btn btn-primary mt-2">
                Responder
            </button>
        </div>

        <!-- CANVAS (para sopa de letras depois) -->
        <div class="col-md-6">
            <canvas id="canvas" class="w-100" height="250"></canvas>
        </div>

        <div id="wordsFound" class="mt-3">
            <h5>Palavras Encontradas:</h5>
            <ul id="foundList" style="display: none;"></ul>
        </div>

    </div>

    <script src="js/canvasExercises.js"></script>
    <script type="module" src="js/controllers/exerciseController.js"></script>

</body>

</html>
